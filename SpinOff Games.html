<h2 style="color: white"> <big><big>Sonic Drift (Mar. 18th, 1994) (Sega Game Gear)</big></big></h2>
	<div style="text-align: center;">
		<img src="C:\Users\jacob\OneDrive\Pictures\Sonic Boxarts\Sonic Drift.png" alt="Sonic Drift Boxart">
	</div>
<p style="color: white;">
<big><big>Sonic Drift contains the first playable appearance of Dr. Eggman in the series.</big></big></p>



<h2 style="color: white"> <big><big>Sonic Drift 2 (Mar. 17th, 1995) (Sega Game Gear)</big></big></h2>
	<div style="text-align: center;">
		<img src="C:\Users\jacob\OneDrive\Pictures\Sonic Boxarts\Sonic Drift 2.png" alt="Sonic Drift 2 Boxart">
	</div>
<p style="color: white;">
<big><big>Despite the first game never releasing on the original Game Gear outside of Japan, the title in the worldwide releases of Sonic Drift 2 were still called "Sonic Drift 2".</big></big></p>



<h2 style="color: white"> <big><big>Sonic Riders (Feb. 21st, 2006) (PS2/Xbox/GameCube/PC)</big></big></h2>
	<div style="text-align: center;">
		<img src="C:\Users\jacob\OneDrive\Pictures\Sonic Boxarts\Sonic Riders.png" alt="Sonic Riders Boxart" style="width:440px; height:560px">
	</div>
<p style="color: white;">
<big><big>Sonic Riders was the final title in the Sonic series to have it's co-creator's name in the credits, as Yuji Naka left after the game released and during the development of Sonic 06.</big></big></p>



<h2 style="color: white"> <big><big>Sonic Riders: Zero Gravity (Jan. 8th, 2009) (PS2/Wii)</big></big></h2>
	<div style="text-align: center;">
		<img src="C:\Users\jacob\OneDrive\Pictures\Sonic Boxarts\Sonic Riders Zero Gravity.png" alt="Sonic Riders: Zero Gravity Boxart" style="width:440px; height:560px">
	</div>
<p style="color: white;">
<big><big>Sonic Riders: Zero Gravity is the last game to use voice lines recorded by Deem Bristow as Dr. Eggman, as Free Riders only uses voice lines from his current voice actor, Mike Pollock.</big></big></p>




<h2 style="color: white"> <big><big>Sonic Free Riders (Oct. 1st, 2010) (Xbox 360)</big></big></h2>
	<div style="text-align: center;">
		<img src="C:\Users\jacob\OneDrive\Pictures\Sonic Boxarts\Sonic Free Riders.png" alt="Sonic Free Riders Boxart" style="width:440px; height:560px">
	</div>
<p style="color: white;">
<big><big>Sonic Free Riders is the last Sonic racing game where characters can run on foot.</big></big></p>



<h2 style="color: white"> <big><big>Team Sonic Racing (May. 21st, 2019) (PS4/Xbox One/Switch/PC)</big></big></h2>
	<div style="text-align: center;">
		<img src="C:\Users\jacob\OneDrive\Pictures\Sonic Boxarts\Team Sonic Racing.png" alt="Team Sonic Racing Boxart">
	</div>
<p style="color: white;">
<big><big>Team Sonic Racing is the only game in the Sonic console franchise where it has Sonic's name in the title but not have it be the first word in the title.</big></big></p>



<h2 style="color: white"> <big><big>Sonic Racing: CrossWorlds (Sept. 25th, 2025) (PS4/PS5/Xbox Series X+S/Switch/Switch 2/PC)</big></big></h2>
	<div style="text-align: center;">
		<img src="C:\Users\jacob\OneDrive\Pictures\Sonic Boxarts\Sonic Racing CrossWorlds.png" alt="Sonic Racing: CrossWorlds Boxart" style="width:440px; height:560px">
	</div>
<p style="color: white;">
<big><big>Sonic Racing: CrossWorlds is the first console game in the series to introduce characters from the IDW Comic series as playable characters, being Tangle The Lemur and Whisper The Wolf.</big></big></p>
