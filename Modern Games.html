<h2 style="color: orange;"> <big><big>Sonic and the Secret Rings (Feb. 20th 2007) (Wii)</big></big></h2>
	<div style="text-align: center;">
		<img src="C:\Users\jacob\OneDrive\Pictures\Sonic Boxarts\Sonic and the Secret Rings.png" alt="Sonic and the Secret Rings Boxart" style="width:319px; height:450px">
	</div>
<p style="color: orange;">
<big><big>Secret Rings was originally meant to be the Nintendo Wii port of Sonic 06, but due to time constraints and Sega wanting to take advantage of the Wii Remote, they split the 06 team in half to work on Secret Rings instead of a Wii port of Sonic 06.</big></big></p>



<h2 style="color: orange;"> <big><big>Sonic Unleashed (Nov. 18th 2008) (PS3/PS2/Xbox 360/Wii/Java)</big></big></h2>
	<div style="text-align: center;">
		<img src="C:\Users\jacob\OneDrive\Pictures\Sonic Boxarts\Sonic Unleashed.png" alt="Sonic Unleashed Boxart">
	</div>
<p style="color: orange;">
<big><big>Sonic Unleashed is the first game in the series to use Sega and Sonic Team's custom lighting engine, The Hedgehog Engine, which would eventually get a 2nd version called The Hedgehog Engine 2 with the release of Sonic Forces in 2017.
</big></big></p>



<h2 style="color: orange;"> <big><big>Sonic and the Black Knight (Mar. 12th 2009) (Wii)</big></big></h2>
	<div style="text-align: center;">
		<img src="C:\Users\jacob\OneDrive\Pictures\Sonic Boxarts\Sonic and the Black Knight.png" alt="Sonic and the Black Knight Boxart">
	</div>
<p style="color: orange;">
<big><big>Despite Black Knight being the first game to be given the title "Storybook Series" on it's boxart as a direct followup to Secret Rings, it's also the last game in the Storybook Titles, as the unknown titled Wii U Storybook game was cancelled for unknown reasons, and Sonic Lost World was released for the Wii U instead.
</big></big></p>



<h2 style="color: orange;"> <big><big>Sonic Colours (Nov. 11th 2010) (Wii/DS)</big></big></h2>
	<div style="text-align: center;">
		<img src="C:\Users\jacob\OneDrive\Pictures\Sonic Boxarts\Sonic Colours.png" alt="Sonic Colours Boxart"style="width:319px; height:450px">
	</div>
<p style="color: orange;">
<big><big>Sonic Colours, much like Secret Rings, was meant to be the Wii port of another game, in this case Sonic Generations. However, Sega made sure to finish Colours a year before Generations, meaning neither game suffered from time constraints or development mishaps, and both games being received very well by critics.
</big></big></p>



<h2 style="color: orange;"> <big><big>Sonic Generations (Nov. 4th 2011) (PS3/Xbox 360/PC/3DS)</big></big></h2>
	<div style="text-align: center;">
		<img src="C:\Users\jacob\OneDrive\Pictures\Sonic Boxarts\Sonic Generations.png" alt="Sonic Generations Boxart">
	</div>
<p style="color: orange;">
<big><big>Jaleel White was contacted by Sega to be the voice of Classic Sonic within Sonic Generations, however he never responded to Sega so they kept Classic Sonic mute within Generations and his followup appearance in Sonic Forces.
</big></big></p>



<h2 style="color: orange;"> <big><big>Sonic Lost World (Nov. 4th 2013) (Wii U/PC/3DS)</big></big></h2>
	<div style="text-align: center;">
		<img src="C:\Users\jacob\OneDrive\Pictures\Sonic Boxarts\Sonic Lost World.png" alt="Sonic Lost World Boxart">
	</div>
<p style="color: orange;">
<big><big>Sonic Lost World is the only mainline Sonic game to be released on multiple platforms but not release on PlayStation or Xbox, only releasing on Wii U, 3DS, and Steam, unlike Sonic Adventure and Sonic Adventure 2, which ended up getting digital re-releases of their GameCube remasters for PS3, Xbox 360, and Steam around 2010.
</big></big></p>



<h2 style="color: orange;"> <big><big>Sonic Boom: Rise Of Lyric (Nov. 11th 2014) (Wii U)</big></big></h2>
	<div style="text-align: center;">
		<img src="C:\Users\jacob\OneDrive\Pictures\Sonic Boxarts\Sonic Boom Rise Of Lyric.png" alt="Sonic Boom: Rise Of Lyric Boxart"style="width:319px; height:450px">
	</div>
<p style="color: orange;">
<big><big>The developers, Big Red Button, were never told by Sega that Rise Of Lyric was only releasing on the Wii U, and built the game with the PS4 and Xbox One in mind, before having to scale back and change a lot from what was already shown in pre-release footage to have the game run on the Wii U, resulting in the game almost bankrupting Sega for the second time since 2006 with the release of Sonic 06.
</big></big></p>



<h2 style="color: orange;"> <big><big>Sonic Forces (Nov. 7th 2017) (PS4/Xbox One/Switch/PC)</big></big></h2>
	<div style="text-align: center;">
		<img src="C:\Users\jacob\OneDrive\Pictures\Sonic Boxarts\Sonic Forces.png" alt="Sonic Forces Boxart"style="width:440px; height:560px">
	</div>
<p style="color: orange;">
<big><big>Despite having 5 years of development time, 2 years were on the script, 2 years were on the Hedgehog Engine 2, only leaving the last year to develop the game itself, leaving 99% of the stages within the game only lasting around 1:10, and the game itself only lasting around 3 hours.
</big></big></p>



<h2 style="color: orange;"> <big><big>Sonic Frontiers (Nov. 7th 2022) (PS4/PS5/Xbox Series X+S/Switch/PC)</big></big></h2>
	<div style="text-align: center;">
		<img src="C:\Users\jacob\OneDrive\Pictures\Sonic Boxarts\Sonic Frontiers.png" alt="Sonic Frontiers Boxart"style="width:440px; height:560px">
	</div>
<p style="color: orange;">
<big><big>Frontiers was Sega's "go big or go home" title for the series, after the years of mediocre reviews after Generations released. Luckily for Sega, their ambition paid off, allowing them to go even bigger for their Sonic Frontiers followup (which has yet to be announced as of writing this).
</big></big></p>



<h2 style="color: orange;"> <big><big>Sonic X Shadow Generations (Oct. 25th 2024) (PS4/PS5/Xbox Series X+S/Switch/Switch 2/PC)</big></big></h2>
	<div style="text-align: center;">
		<img src="C:\Users\jacob\OneDrive\Pictures\Sonic Boxarts\Sonic X Shadow Generations.png" alt="Sonic X Shadow Generations Boxart"style="width:440px; height:560px">
	</div>
<p style="color: orange;">
<big><big>Shadow Generations is currently the only game in the series that you cannot buy standalone, as it only is available to buy alongside the Sonic Generations remaster in Sonic X Shadow Generations, much like Super Mario 3D World + Bowser's Fury.
</big></big></p>
