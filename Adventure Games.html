<h2 style="color: red;"> <big><big>Sonic Adventure (Dec. 23rd, 1998) (Dreamcast/GameCube/PS3/Xbox 360/PC)</big></big></h2>
	<div style="text-align: center;">
		<img src="C:\Users\jacob\OneDrive\Pictures\Sonic Boxarts\Sonic Adventure.png" alt="Sonic Adventure Boxart">
	</div>
<p style="color: red;">
<big><big>Despite Sonic Adventure releasing on the Dreamcast in 1998 in Japan and 1999 worldwide, the game was originally meant to release on the previous console, the Sega Saturn. However, Sega wanted the true first 3D Sonic game to release on their new console, so any progress that was made on the Saturn was repurposed into Sonic World in Sonic Jam. Remnants of this still exist within the original Dreamcast release, with Sonic and Tails using their Sonic Jam models during the Sky Chase Minigames during both of their stories.</big></big></p>



<h2 style="color: red"> <big><big>Sonic Adventure 2 (Jun. 19th, 2001) (Dreamcast/GameCube/PS3/Xbox 360/PC)</big></big></h2>
	<div style="text-align: center;">
		<img src="C:\Users\jacob\OneDrive\Pictures\Sonic Boxarts\Sonic Adventure 2.png" alt="Sonic Adventure 2 Boxart">
	</div>
<p style="color: red;">
<big><big>Sonic Adventure 2 originally meant to be the finale to the Sonic franchise back in 2001, due to how Sega was falling out of the console market. However, a deal was struck with Nintendo to release this game on the GameCube, and it sold very well, which pushed Sega to keep the series alive, and continue making games as a 3rd Party Developer for Sony, Microsoft, Nintendo, and Steam.</big></big></p>



<h2 style="color: red"> <big><big>Sonic Heroes (Dec. 30th, 2003) (GameCube/PS2/Xbox/PC)</big></big></h2>
	<div style="text-align: center;">
		<img src="C:\Users\jacob\OneDrive\Pictures\Sonic Boxarts\Sonic Heroes.png" alt="Sonic Heroes Boxart">
	</div>
<p style="color: red;">
<big><big>Sonic Heroes currently holds the Guinness World Record for "Most Playable Characters In A Platform Videogame", with 4 teams of 3 characters, Team Sonic (Sonic, Tails, Knuckles), Team Dark (Shadow, Rouge, E-123 Omega), Team Rose (Amy, Cream, Big), and Team Chaotix (Espio, Charmy, Vector), giving the game 12 total characters.</big></big></p>



<h2 style="color: red"> <big><big>Shadow The Hedgehog (Nov. 15th, 2005) (GameCube/PS2/Xbox)</big></big></h2>
	<div style="text-align: center;">
		<img src="C:\Users\jacob\OneDrive\Pictures\Sonic Boxarts\Shadow The Hedgehog.png" alt="Shadow The Hedgehog Boxart">
	</div>
<p style="color: red;">
<big><big>Shadow The Hedgehog is the first game in the series to be given the E10+ rating, but because the rating didn't exist early in development, Jason Griffith, the voice of Sonic and Shadow at the time, mentioned in an interview that the developers were prepared to go for a T for Teen rating, or even an M for Mature rating, with them making him record clean and explicit lines for Sonic and Shadow if they went that direction, with only 2 lines currently being known of as of a recent prototype of the game being found which contains 2 lines from Shadow with explicit wording.</big></big></p>



<h2 style="color: red"> <big><big>Sonic The Hedgehog (Nov. 14th, 2006) (PS3/Xbox 360)</big></big></h2>
	<div style="text-align: center;">
		<img src="C:\Users\jacob\OneDrive\Pictures\Sonic Boxarts\Sonic 06.png" alt="Sonic The Hedgehog 2006 Boxart">
	</div>
<p style="color: red;">
<big><big>Sonic 06 has the most versions of it's theme song "His World" out of any other theme song in the series, not counting remixes. There's the E3 Version, which was used for E3 demonstrations and used in the Super Smash Bros Series and as an unlockable song in Sonic Frontiers. The main version used in the game is by Tomoya Ohtani and 2 members of Zebrahead. There's also one made by Crush 40, who also made the song All Hail Shadow which is used in the game for Shadow's Theme. There's a version made by all the members of Zebrahead at the time. And finally, there's a version made by Bentley Jones, who also made Silver's theme, Dreams Of An Absolution.</big></big></p>
